<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Smart Attendance - QR Check-in</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif
        }

        body {
            background: #0a0f1e
        }

        .glass {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06)
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            transition: all .3s
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(59, 130, 246, 0.4)
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important
        }

        .input-dark {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all .3s
        }

        .input-dark:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.15);
            outline: none
        }

        #webcam {
            border-radius: 12px;
            width: 100%;
            max-width: 320px;
            background: #1e293b;
            transform: scaleX(-1)
        }

        .scan-line {
            position: absolute;
            left: 10%;
            right: 10%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #3b82f6, transparent);
            animation: scan 2s ease-in-out infinite
        }

        @keyframes scan {

            0%,
            100% {
                top: 20%
            }

            50% {
                top: 80%
            }
        }

        .cam-wrap {
            position: relative;
            display: inline-block
        }

        .gps-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px
        }

        .gps-dot.active {
            background: #10b981;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
            animation: pulse 2s infinite
        }

        .gps-dot.inactive {
            background: #ef4444
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.5
            }
        }
    </style>
</head>

<body class="min-h-screen text-white flex items-center justify-center p-4">
    <div class="w-full max-w-lg glass rounded-3xl p-8">
        <div class="text-center mb-6">
            <div
                class="w-14 h-14 rounded-2xl bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-2xl font-bold mx-auto">
                M</div>
            <h2 class="text-xl font-bold mt-3">Smart Attendance</h2>
            <p class="text-gray-400 text-sm mt-1" id="subjectDisplay">Scanning QR session...</p>
        </div>

        <!-- Step 1: Login Form -->
        <div id="stepLogin">
            <p class="text-gray-400 text-sm mb-4 text-center">Enter your student credentials to check in</p>
            <form id="loginForm" class="space-y-3">
                <div id="loginError"
                    class="hidden bg-red-500/10 border border-red-500/30 text-red-400 px-4 py-2 rounded-xl text-sm">
                </div>
                <input type="email" id="email" required placeholder="your.name@met.edu"
                    class="input-dark w-full px-4 py-3 rounded-xl">
                <input type="password" id="password" required placeholder="Password"
                    class="input-dark w-full px-4 py-3 rounded-xl">
                <button type="submit" id="loginBtn"
                    class="btn-primary w-full py-3 rounded-xl text-white font-semibold text-sm">Sign In &
                    Check-in</button>
            </form>
        </div>

        <!-- Step 2: Face Capture & Check-in -->
        <div id="stepCheckin" class="hidden">
            <!-- Student Info -->
            <div class="bg-white/5 rounded-xl p-4 mb-4">
                <div class="flex items-center space-x-3">
                    <div class="w-12 h-12 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-lg font-bold"
                        id="avatarInitials">S</div>
                    <div>
                        <p class="font-semibold text-sm" id="studentName">-</p>
                        <p class="text-xs text-gray-400" id="studentRoll">-</p>
                        <p class="text-xs text-gray-500" id="studentCourse">-</p>
                    </div>
                </div>
            </div>

            <div class="bg-white/5 rounded-xl p-3 mb-4 text-center">
                <p class="text-sm text-blue-400 font-semibold" id="checkinSubject">Subject: -</p>
            </div>

            <!-- Status Indicators -->
            <div class="flex justify-center space-x-6 mb-4 text-xs">
                <div><span class="gps-dot inactive" id="gpsDot"></span><span id="gpsText">GPS...</span></div>
                <div><span class="gps-dot inactive" id="camDot"></span><span id="camText">Camera...</span></div>
            </div>

            <!-- Webcam -->
            <div class="flex flex-col items-center mb-4">
                <div class="cam-wrap">
                    <video id="webcam" autoplay playsinline></video>
                    <div class="scan-line"></div>
                </div>
            </div>

            <button onclick="performCheckin()" id="checkinBtn"
                class="btn-primary w-full py-3.5 rounded-xl text-white font-semibold text-sm">&#128247; Capture Face &
                Check-in</button>
            <div id="checkinResult" class="hidden mt-4 p-4 rounded-xl text-sm text-center"></div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const QR_TOKEN = urlParams.get('qr_token') || '';
        const SUBJECT = urlParams.get('subject') || 'N/A';
        document.getElementById('subjectDisplay').textContent = 'Session: ' + SUBJECT;
        document.getElementById('checkinSubject').textContent = 'Subject: ' + SUBJECT;

        let user = null, webcamStream = null, capturedLat = 0, capturedLng = 0;
        let gpsReady = false, camReady = false;

        // Start GPS immediately
        navigator.geolocation.getCurrentPosition(
            p => { capturedLat = p.coords.latitude; capturedLng = p.coords.longitude; gpsReady = true; document.getElementById('gpsDot').className = 'gps-dot active'; document.getElementById('gpsText').textContent = 'GPS: OK'; },
            () => { document.getElementById('gpsText').textContent = 'GPS: Allow location'; },
            { enableHighAccuracy: true, timeout: 15000 }
        );

        // Login form
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            btn.disabled = true; btn.innerHTML = 'Signing in...';
            try {
                const res = await fetch('/api/login/', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
                const data = await res.json();
                if (data.success && data.user && data.user.role === 'STUDENT') {
                    user = data.user;
                    sessionStorage.setItem('session_token', data.session_token);
                    // Show student info
                    document.getElementById('avatarInitials').textContent = (user.name || 'S').charAt(0).toUpperCase();
                    document.getElementById('studentName').textContent = user.name || '-';
                    document.getElementById('studentRoll').textContent = 'Roll: ' + (user.roll_number || 'N/A');
                    document.getElementById('studentCourse').textContent = (user.course || '') + ' ' + (user.semester || '').replace('_', ' ');
                    // Switch to check-in view
                    document.getElementById('stepLogin').classList.add('hidden');
                    document.getElementById('stepCheckin').classList.remove('hidden');
                    startCam();
                } else {
                    document.getElementById('loginError').textContent = data.error || 'Student login failed. Use your student @met.edu account.';
                    document.getElementById('loginError').classList.remove('hidden');
                }
            } catch (err) { document.getElementById('loginError').textContent = 'Network error'; document.getElementById('loginError').classList.remove('hidden'); }
            btn.disabled = false; btn.textContent = 'Sign In & Check-in';
        });

        // Camera
        async function startCam() {
            try {
                webcamStream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: 'user' } });
                document.getElementById('webcam').srcObject = webcamStream;
                camReady = true;
                document.getElementById('camDot').className = 'gps-dot active';
                document.getElementById('camText').textContent = 'Camera: Ready';
            } catch (e) { document.getElementById('camText').textContent = 'Camera denied'; }
        }

        // CHECK-IN
        async function performCheckin() {
            const btn = document.getElementById('checkinBtn');
            const resultDiv = document.getElementById('checkinResult');
            resultDiv.classList.add('hidden');
            btn.disabled = true; btn.innerHTML = 'Processing...';

            // Validate
            if (!user) { showError('Please login first'); btn.disabled = false; btn.innerHTML = '&#128247; Capture Face & Check-in'; return; }
            if (!QR_TOKEN) { showError('Invalid QR session'); btn.disabled = false; btn.innerHTML = '&#128247; Capture Face & Check-in'; return; }
            if (!gpsReady) { showError('GPS required. Please enable location services.'); btn.disabled = false; btn.innerHTML = '&#128247; Capture Face & Check-in'; return; }
            if (!camReady) { showError('Camera required.'); btn.disabled = false; btn.innerHTML = '&#128247; Capture Face & Check-in'; return; }

            // Capture face from webcam (for demo, generate a simulated 128-dim embedding + show capture)
            const canvas = document.createElement('canvas');
            canvas.width = 160; canvas.height = 120;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(document.getElementById('webcam'), 0, 0, 160, 120);

            // In production, FaceNet/DeepFace model would extract embedding from canvas
            // For demo, generate simulated embedding
            const embedding = [];
            for (let i = 0; i < 128; i++) embedding.push((Math.random() * 2 - 1) * 0.5 + 0.5);

            try {
                const res = await fetch('/api/attendance/checkin/', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        student_id: user._id,
                        qr_token: QR_TOKEN,
                        live_embedding: embedding,
                        latitude: capturedLat,
                        longitude: capturedLng,
                        liveness_score: 0.7,
                        embedding_quality: 0.6,
                    })
                });
                const data = await res.json();
                if (data.success) {
                    resultDiv.className = 'mt-4 p-4 rounded-xl text-sm text-center bg-green-500/10 border border-green-500/30 text-green-400';
                    resultDiv.innerHTML = '&#10003; Attendance Marked!<br><span class="text-xs">' + user.name + ' - ' + SUBJECT + '</span>';
                    btn.innerHTML = '&#10003; Done';
                } else {
                    showError(data.error || 'Check-in failed');
                    btn.disabled = false; btn.innerHTML = '&#128247; Try Again';
                }
            } catch (err) { showError('Network error'); btn.disabled = false; btn.innerHTML = '&#128247; Try Again'; }
            resultDiv.classList.remove('hidden');
        }

        function showError(msg) {
            const div = document.getElementById('checkinResult');
            div.className = 'mt-4 p-4 rounded-xl text-sm text-center bg-red-500/10 border border-red-500/30 text-red-400';
            div.innerHTML = '&#10007; ' + msg;
            div.classList.remove('hidden');
        }
    </script>
</body>

</html>
